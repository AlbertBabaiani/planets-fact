@if (isLoading()) {
  <div class="loader-overlay" @fadeOut>

    <p class="loading-text">MAPPING THE GALAXY...</p>
  </div>
}

<div class="container" [style]="{ '--bg-x': bgX() + '%', '--bg-y': bgY() + '%' }">
  <app-navbar />

  <main>
    <router-outlet />
  </main>
</div>
