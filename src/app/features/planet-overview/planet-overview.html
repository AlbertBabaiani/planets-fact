<div
  class="mobile-panel"
  [style]="{ '--selected-planet': `var(--${planet()?.name?.toLowerCase()}` }"
>
  <button
    type="button"
    role="tab"
    (click)="section.set('overview')"
    [class.selected]="section() === 'overview'"
  >
    OVERVIEW
  </button>
  <button
    type="button"
    role="tab"
    (click)="section.set('structure')"
    [class.selected]="section() === 'structure'"
  >
    STRUCTURE
  </button>
  <button
    type="button"
    role="tab"
    (click)="section.set('geology')"
    [class.selected]="section() === 'geology'"
  >
    SURFACE
  </button>
</div>

<div class="grid" [@planetAnimation]="planetName()">
  <div class="planet-img">
    <img
      class="main-img"
      [src]="mainImg()"
      [alt]="mainImgAltText()"
      [class]="planetName()?.toLowerCase()"
      [@imageTransition]="section()"
    />

    @if (this.section() === 'geology') {
      <img class="surface-img" [src]="surfaceImg()" [alt]="surfaceImgAltText()" @popUp />
    }
  </div>

  <div
    class="planet-info"
    [style]="{ '--selected-planet': `var(--${planet()?.name?.toLowerCase()})` }"
  >
    <div class="content">
      <h1>{{ planet()?.name }}</h1>

      <p class="overview">
        {{ textContent() }}
      </p>

      <p class="source">
        Source:
        <a [href]="wikipediaLink()" target="_blank"
          >Wikipedia

          <img src="assets/images/shared/icon-source.svg" alt="See more" />
        </a>
      </p>
    </div>

    <ul class="tabs">
      <li class="section-selector">
        <button
          type="button"
          role="tab"
          (click)="section.set('overview')"
          [class.selected]="section() === 'overview'"
        >
          <span>01</span>
          OVERVIEW
        </button>
      </li>

      <li class="section-selector">
        <button
          type="button"
          role="tab"
          (click)="section.set('structure')"
          [class.selected]="section() === 'structure'"
        >
          <span>02</span>
          INTERNAL STRUCTURE
        </button>
      </li>

      <li class="section-selector">
        <button
          type="button"
          role="tab"
          (click)="section.set('geology')"
          [class.selected]="section() === 'geology'"
        >
          <span>03</span>
          SURFACE GEOLOGY
        </button>
      </li>
    </ul>
  </div>
</div>

<div class="info-block" [@planetAnimation]="planetName()">
  <div class="block">
    <p class="block-title">ROTATION TIME</p>
    <p class="block-value">{{ planet()?.rotation }}</p>
  </div>

  <div class="block">
    <p class="block-title">REVOLUTION TIME</p>
    <p class="block-value">{{ planet()?.revolution }}</p>
  </div>

  <div class="block">
    <p class="block-title">RADIUS</p>
    <p class="block-value">{{ planet()?.radius }}</p>
  </div>

  <div class="block">
    <p class="block-title">AVERAGE TEMP.</p>
    <p class="block-value">{{ planet()?.temperature }}</p>
  </div>
</div>
