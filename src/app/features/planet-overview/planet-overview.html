<div
  class="mobile-panel"
  [style]="{ '--selected-planet': `var(--${planet()?.name?.toLowerCase()}` }"
>
  <button type="button" class="active">OVERVIEW</button>
  <button type="button">STRUCTURE</button>
  <button type="button">SURFACE</button>
</div>

<div class="grid">
  <div class="planet-img" [class]="planetName()?.toLowerCase()">
    <img src="assets/images/planets/{{ planetName() }}/planet-{{ planetName() }}.svg" alt="" />
    <!-- Todo: Add Alt Text -->
  </div>

  <div
    class="planet-info"
    [style]="{ '--selected-planet': `var(--${planet()?.name?.toLowerCase()}` }"
  >
    <div class="content">
      <h1>{{ planet()?.name }}</h1>

      <p class="overview">
        {{ planet()?.overview?.content }}
      </p>

      <!-- Todo: Add Link -->

      <p class="source">
        Source:
        <a [href]="''" target="_blank"
          >Wikipedia

          <img src="assets/images/shared/icon-source.svg" alt="See more" />
        </a>
      </p>
    </div>

    <ul class="tabs">
      <li class="section-selector">
        <button type="button" class="selected">
          <span>01</span>
          OVERVIEW
        </button>
      </li>

      <li class="section-selector">
        <button type="button">
          <span>02</span>
          INTERNAL STRUCTURE
        </button>
      </li>

      <li class="section-selector">
        <button type="button">
          <span>03</span>
          SURFACE GEOLOGY
        </button>
      </li>
    </ul>
  </div>
</div>

<div class="info-block">
  <div class="block">
    <p class="block-title">ROTATION TIME</p>
    <p class="block-value">{{ planet()?.rotation }}</p>
  </div>

  <div class="block">
    <p class="block-title">REVOLUTION TIME</p>
    <p class="block-value">{{ planet()?.revolution }}</p>
  </div>

  <div class="block">
    <p class="block-title">RADIUS</p>
    <p class="block-value">{{ planet()?.radius }}</p>
  </div>

  <div class="block">
    <p class="block-title">AVERAGE TEMP.</p>
    <p class="block-value">{{ planet()?.temperature }}</p>
  </div>
</div>
